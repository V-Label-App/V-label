name: V-Label CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

permissions:
  contents: read
  packages: write  # Required for pushing Docker images to GitHub Container Registry

jobs:
  # Job 1: Test & Build Backend Docker Image
  test-and-build-backend:
    name: 🧪 Test & Build Backend API
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./server
        run: npx prisma generate

      - name: Run TypeScript build
        working-directory: ./server
        run: npm run build

      - name: Run tests (if available)
        working-directory: ./server
        run: npm test || echo "No tests configured"
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: server/dist
          retention-days: 1

  # Job 2: Test & Build Frontend Docker Image
  test-and-build-frontend:
    name: 🎨 Test & Build Frontend Client
    environment: production
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Frontend
        working-directory: ./client
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run build

      - name: Run tests (if available)
        working-directory: ./client
        run: npm test || echo "No tests configured"
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: client/dist
          retention-days: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository owner
        id: lower
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.lower.outputs.owner }}/vlabel-server:latest
            ghcr.io/${{ steps.lower.outputs.owner }}/vlabel-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Client Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.lower.outputs.owner }}/vlabel-client:latest
            ghcr.io/${{ steps.lower.outputs.owner }}/vlabel-client:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ vars.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
            VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 3: Deploy to VPS (only on main branch)
  deploy-to-production:
    name: 🚀 Deploy to Production VPS
    environment: production
    runs-on: ubuntu-latest
    needs: [test-and-build-backend, test-and-build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Debug Secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DB_USER: ${{ vars.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ vars.DB_NAME }}
        run: |
          echo "Checking Secrets..."
          if [ -z "$VPS_HOST" ]; then echo "❌ Error: VPS_HOST secret is missing or empty"; exit 1; fi
          if [ -z "$VPS_USER" ]; then echo "❌ Error: VPS_USER secret is missing or empty"; exit 1; fi
          if [ -z "$DEPLOY_PATH" ]; then echo "❌ Error: DEPLOY_PATH secret is missing or empty"; exit 1; fi
          if [ -z "$DB_USER" ]; then echo "❌ Error: DB_USER variable is missing or empty"; exit 1; fi
          if [ -z "$DB_PASSWORD" ]; then echo "❌ Error: DB_PASSWORD secret is missing or empty. Postgres will crash without it!"; exit 1; fi
          if [ -z "$DB_NAME" ]; then echo "❌ Error: DB_NAME variable is missing or empty"; exit 1; fi
          echo "✅ All required secrets accept values."

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env.production from GitHub Secrets & Variables
        env:
          # VPS Configuration (Secrets - sensitive/config)
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          # Database Config (Mixed)
          DB_USER: ${{ vars.DB_USER }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          # Server Config (Mixed)
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          # Firebase Server (Mixed)
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ vars.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          # AI Config (Secret)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Email/SMTP Config (Mixed)
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ vars.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          # Cloudinary Config (Mixed)
          CLOUDINARY_CLOUD_NAME: ${{ vars.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          # Frontend Config (Mixed)
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'EOF'
            set -e
            
            echo "📝 Creating .env.production from GitHub Secrets & Variables..."
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Create .env.production
            cat > .env.production << 'ENVEOF'
            # Auto-generated by GitHub Actions on $(date)
            # DO NOT EDIT MANUALLY - Changes will be overwritten on next deployment
            
            # Database Configuration
            DB_USER="${{ vars.DB_USER }}"
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            DB_NAME="${{ vars.DB_NAME }}"
            
            # Server Configuration
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            LOG_LEVEL="${{ vars.LOG_LEVEL }}"
            
            # Firebase Admin SDK (Server-side)
            FIREBASE_PROJECT_ID="${{ vars.FIREBASE_PROJECT_ID }}"
            FIREBASE_CLIENT_EMAIL="${{ vars.FIREBASE_CLIENT_EMAIL }}"
            FIREBASE_PRIVATE_KEY='${{ secrets.FIREBASE_PRIVATE_KEY }}'
            
            # AI Configuration
            GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
            
            # Email Configuration
            EMAIL_FROM="${{ vars.EMAIL_FROM }}"
            SMTP_HOST="${{ vars.SMTP_HOST }}"
            SMTP_PORT="${{ vars.SMTP_PORT }}"
            SMTP_USER="${{ vars.SMTP_USER }}"
            SMTP_PASS="${{ secrets.SMTP_PASS }}"
            FRONTEND_URL="${{ vars.FRONTEND_URL }}"
            
            # Cloudinary Configuration
            CLOUDINARY_CLOUD_NAME="${{ vars.CLOUDINARY_CLOUD_NAME }}"
            CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}"
            CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}"
            
            # Client Configuration (Vite build-time variables)
            VITE_API_URL="${{ vars.VITE_API_URL }}"
            VITE_FIREBASE_API_KEY="${{ secrets.VITE_FIREBASE_API_KEY }}"
            VITE_FIREBASE_AUTH_DOMAIN="${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}"
            VITE_FIREBASE_PROJECT_ID="${{ vars.VITE_FIREBASE_PROJECT_ID }}"
            VITE_FIREBASE_STORAGE_BUCKET="${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}"
            VITE_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}"
            VITE_FIREBASE_APP_ID="${{ secrets.VITE_FIREBASE_APP_ID }}"
            VITE_FIREBASE_MEASUREMENT_ID="${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}"
          ENVEOF
            
            echo "✅ .env.production created successfully"
          EOF

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'EOF'
            set -e
            
            echo "🚀 Starting deployment..."
            
            # Navigate to project directory
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Pull latest code using GITHUB_TOKEN (force reset to match GitHub)
            echo "📥 Fetching latest code..."
            git fetch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
            echo "🔄 Resetting to match GitHub main branch..."
            git reset --hard FETCH_HEAD
            
            # Load environment variables
            set -a
            source .env.production
            set +a
            
            # Add GitHub repo owner for image pulling (lowercase required for Docker)
            REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            export GITHUB_REPO_OWNER="${REPO_OWNER}"
            echo "GITHUB_REPO_OWNER=${GITHUB_REPO_OWNER}" >> .env.production
            
            # Login to GitHub Container Registry
            echo "🔑 Logging into GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Stop current containers FIRST (to release image locks)
            echo "⏹️  Stopping current containers..."
            docker compose -f docker-compose.prod.pull.yml down

            # Cleanup ALL Docker resources including current images (Aggressive Cleanup)
            echo "🧹 Cleaning up old Docker resources..."
            docker system prune -a -f --volumes || true
            
            # Pull latest images
            echo "📥 Pulling pre-built Docker images..."
            docker compose -f docker-compose.prod.pull.yml pull
            
            # Pull latest images (No build needed!)
            echo "📥 Pulling pre-built Docker images..."
            docker compose -f docker-compose.prod.pull.yml pull
            
            # Start services with pulled images
            echo "🚀 Starting services..."
            docker compose -f docker-compose.prod.pull.yml up -d
            
            # Wait for services to be healthy
            echo "⏳ Waiting for services to be ready..."
            sleep 15
            
            # Run database migrations
            echo "📦 Running database migrations..."
            docker compose -f docker-compose.prod.pull.yml exec -T server npx prisma migrate deploy
            
            # Check service status
            echo "✅ Checking service status..."
            docker compose -f docker-compose.prod.pull.yml ps
            
            # Health check
            echo "🏥 Running health check..."
            curl -f http://localhost:4000/api/v1/health || echo "❌ Health check failed"
            
            # Cleanup old images to save space
            echo "🧹 Cleaning up old Docker images..."
            docker image prune -f
            
            echo "🎉 Deployment completed successfully!"
          EOF

      - name: Deployment notification
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment succeeded!"
          else
            echo "❌ Deployment failed!"
          fi

      - name: Debug Deployment Failure
        if: failure()
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo "🔍 Fetching container logs..."
          ssh $VPS_USER@$VPS_HOST "cd $DEPLOY_PATH && docker compose -f docker-compose.prod.pull.yml logs --tail=100" || true
